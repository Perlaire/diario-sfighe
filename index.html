const store = {
  get: function(k) { try { var v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch(ex){return null;} },
  set: function(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch(ex){} }

const emptyHead = function() { return {id:Date.now(),type:"head",date:TODAY(),timeStart:"",timeEnd:"",painLevel:0,location:"",altroLocation:"",triggers:[],altroTrigger:"",mestruazioniGiorno:"",medicine:"Nessuno",medicineTime:"",effect:"",sideEffects:[],notes:""}; };
const emptyStom = function() { return {id:Date.now(),type:"stom",date:TODAY(),timeStart:"",timeEnd:"",stomType:[],location:"",altroLocation:"",triggers:[],altroTrigger:"",cibo:"",bevanda:"",medicine:"Nessuno",medicineTime:"",effect:"",sideEffects:[],notes:""}; };

var inputStyle = {width:"100%",padding:"9px 12px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:14,background:"#fafafa",boxSizing:"border-box",outline:"none"};

function Badge(props) {
  return e('button',{onClick:props.onClick,style:{padding:"6px 14px",borderRadius:20,border:"1.5px solid "+props.color,background:props.active?props.color:"transparent",color:props.active?"#fff":props.color,fontSize:13,fontWeight:500,marginBottom:6,marginRight:6,transition:"all .18s"}},props.children);

function Field(props) {
  return e('div',{style:{marginBottom:18}},
    e('label',{style:{display:"block",fontSize:12,fontWeight:700,letterSpacing:.8,color:"#888",marginBottom:6,textTransform:"uppercase"}},props.label),

function Inp(props) {

function Txta(props) {
  var style = Object.assign({},inputStyle,{resize:"vertical"},props.style||{});
  return e('textarea',Object.assign({},props,{rows:3,style:style}));
}

function MultiSelect(props) {
  return e('div',{style:{display:"flex",flexWrap:"wrap"}},
    props.options.map(function(o) {
      return e(Badge,{key:o,color:props.color,active:props.value.indexOf(o)>=0,onClick:function(){
        if(props.value.indexOf(o)>=0) props.onChange(props.value.filter(function(x){return x!==o;}));
        else props.onChange(props.value.concat([o]));

    })

function SingleSelect(props) {
  return e('div',{style:{display:"flex",flexWrap:"wrap"}},
    props.options.map(function(o) {
      return e(Badge,{key:o,color:props.color,active:props.value===o,onClick:function(){props.onChange(props.value===o?"":o);}},o);

function PainScale(props) {

        !isHead&&a.stomType&&a.stomType.length>0?e('span',{style:{marginLeft:8,fontSize:12,color:color,fontWeight:600}},"· "+a.stomType.join(", ")):null

      e('div',{style:{display:"flex",alignItems:"center",gap:8}},

        a.medicine&&a.medicine!=="Nessuno"?e('div',null,e('div',{style:{fontSize:11,fontWeight:700,color:"#aaa",letterSpacing:.7,marginBottom:5}},"FARMACO"),e('div',{style:{fontSize:13}},a.medicine+(a.medicineTime?" · "+a.medicineTime:""))):null,

        a.sideEffects&&a.sideEffects.filter(function(s){return s!=="Nessuno";}).length>0?e('div',null,e('div',{style:{fontSize:11,fontWeight:700,color:"#aaa",letterSpacing:.7,marginBottom:5}},"EFFETTI COLLATERALI"),e('div',{style:{fontSize:13}},a.sideEffects.filter(function(s){return s!=="Nessuno";}).join(", "))):null

      a.notes?e('div',{style:{marginTop:12,padding:"10px 12px",background:"#fafafa",borderRadius:8,fontSize:13,color:"#555",fontStyle:"italic"}},"📝 "+a.notes):null,
      e('div',{style:{display:"flex",gap:8,marginTop:14}},
        e('button',{onClick:function(){setDraft(Object.assign({},a));setEditing(true);},style:{padding:"6px 16px",border:"1.5px solid "+color,background:"transparent",color:color,borderRadius:8,fontSize:12,fontWeight:600}},"✏️ Modifica"),
        e('button',{onClick:function(){props.onDelete(a.id);},style:{padding:"6px 16px",border:"none",background:"#fee",color:"#c00",borderRadius:8,fontSize:12,fontWeight:600}},"🗑 Elimina")
      )
    ):null,
    open&&editing?e('div',{style:{padding:"0 18px 18px",borderTop:"1px solid #f0f0f0"}},
      e('div',{style:{marginTop:14}},
        e(IEField,{label:"Ora fine"},e(Inp,{type:"time",value:draft.timeEnd,onChange:function(ev){set("timeEnd",ev.target.value);},style:{maxWidth:160}})),
        isHead?e(IEField,{label:"Intensit\u00e0 dolore"},e(PainScale,{value:draft.painLevel||0,onChange:function(v){set("painLevel",v);}})):null,
        !isHead?e(IEField,{label:"Tipologia"},e(MultiSelect,{options:STOM_TYPES,value:draft.stomType||[],onChange:function(v){set("stomType",v);},color:color})):null,
        e(IEField,{label:"Farmaco"},e(SingleSelect,{options:isHead?HEAD_MEDS:STOM_MEDS,value:draft.medicine,onChange:function(v){set("medicine",v||"Nessuno");},color:color})),
        draft.medicine&&draft.medicine!=="Nessuno"?e(IEField,{label:"Orario farmaco"},e(Inp,{type:"time",value:draft.medicineTime,onChange:function(ev){set("medicineTime",ev.target.value);},style:{maxWidth:160}})):null,
        e(IEField,{label:"Effetto"},e(SingleSelect,{options:isHead?HEAD_EFFECTS:STOM_EFFECTS,value:draft.effect,onChange:function(v){set("effect",v);},color:color})),
        e(IEField,{label:"Effetti collaterali"},e(MultiSelect,{options:SIDE_EFFECTS,value:draft.sideEffects||[],onChange:function(v){set("sideEffects",v);},color:color})),
        isHead&&draft.triggers&&draft.triggers.indexOf("Mestruazioni")>=0?e(IEField,{label:"Giorno del ciclo"},e(SingleSelect,{options:GIORNI_MESTR,value:draft.mestruazioniGiorno||"",onChange:function(v){set("mestruazioniGiorno",v);},color:color})):null,
        !isHead&&draft.triggers&&draft.triggers.indexOf("Cibo")>=0?e(IEField,{label:"Cosa hai mangiato?"},e(Inp,{placeholder:"es. pasta, pizza\u2026",value:draft.cibo||"",onChange:function(ev){set("cibo",ev.target.value);}})):null,
        !isHead&&draft.triggers&&draft.triggers.indexOf("Bevanda")>=0?e(IEField,{label:"Cosa hai bevuto?"},e(Inp,{placeholder:"es. caff\u00e8, alcool\u2026",value:draft.bevanda||"",onChange:function(ev){set("bevanda",ev.target.value);}})):null,
        draft.triggers&&draft.triggers.indexOf("Altro")>=0?e(IEField,{label:"Specifica trigger"},e(Inp,{placeholder:"Descrivi\u2026",value:draft.altroTrigger||"",onChange:function(ev){set("altroTrigger",ev.target.value);}})):null
      ),
      e('div',{style:{display:"flex",gap:8,marginTop:16}},
        e('button',{onClick:save,style:{padding:"8px 20px",background:color,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}},"✅ Salva modifiche"),
        e('button',{onClick:function(){setEditing(false);},style:{padding:"8px 16px",background:"transparent",color:"#888",border:"1.5px solid #ddd",borderRadius:8,fontSize:13}},"Annulla")
      )
    ):null
  );

function AttackForm(props) {

  var _form=useState(isHead?emptyHead():emptyStom()); var form=_form[0]; var setForm=_form[1];
  function set(k,v){setForm(function(f){var r=Object.assign({},f); r[k]=v; return r;});}

    if(!form.date||!form.timeStart){alert("Inserisci almeno data e ora di inizio.");return;}
    props.onSave(Object.assign({},form,{id:Date.now()}));
  }
  return e('div',{style:{background:CARD_BG,borderRadius:16,border:"2px solid "+color+"28",padding:24,marginBottom:24,boxShadow:"0 4px 24px "+color+"12"}},
    e('h3',{style:{margin:"0 0 20px",color:color,fontFamily:"'Playfair Display',Georgia,serif",fontSize:20}},isHead?"🧠 Nuovo attacco di mal di testa":"🤢 Nuovo attacco di mal di stomaco"),
    e(Field,{label:"Data"},
      e('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}},QUICK_DAYS.map(function(d){return e(Badge,{key:d.value,color:color,active:form.date===d.value,onClick:function(){set("date",d.value);}},d.label);})),
      e(Inp,{type:"date",value:form.date,onChange:function(ev){set("date",ev.target.value);}})

      ):null,
      form.triggers.indexOf("Altro")>=0?e(Inp,{style:{marginTop:8},placeholder:"Specifica il fattore\u2026",value:form.altroTrigger,onChange:function(ev){set("altroTrigger",ev.target.value);}}):null
    ),
    !isHead&&form.triggers.indexOf("Cibo")>=0?e(Field,{label:"Cosa hai mangiato?"},e(Inp,{placeholder:"es. pasta al pomodoro\u2026",value:form.cibo,onChange:function(ev){set("cibo",ev.target.value);}})):null,
    !isHead&&form.triggers.indexOf("Bevanda")>=0?e(Field,{label:"Cosa hai bevuto?"},e(Inp,{placeholder:"es. caff\u00e8, alcool\u2026",value:form.bevanda,onChange:function(ev){set("bevanda",ev.target.value);}})):null,

function StatCard(props) {

        );

function StatsPage(props) {

  function monthly(arr){
    var r=[];
    for(var i=fm-1;i>=0;i--){
      var d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
      var dm=d.getMonth(), dy=d.getFullYear();
      r.push({label:d.toLocaleDateString("it-IT",{month:"short"}),value:arr.filter(function(a){var ad=new Date(a.date);return ad.getMonth()===dm&&ad.getFullYear()===dy;}).length});
    }

  }
  function countF(arr,field){

    return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return {label:x[0],value:x[1]};});

    return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).map(function(x){return {label:x[0],value:x[1]};});

      })

    e('div',{style:{display:"flex",gap:12,marginBottom:24}},
      e(StatCard,{value:head.length,label:"Mal di testa totali",color:HEAD_COLOR}),
      e(StatCard,{value:stom.length,label:"Mal di stomaco totali",color:STOM_COLOR})

    e('div',{style:{background:CARD_BG,borderRadius:12,border:"1px solid #ececec",padding:"18px 16px",marginBottom:24}},
      e(STitle,null,"📅 Andamento per mese"),
      all.length?e(MonthlyChart,{headData:monthly(head),stomData:monthly(stom)}):e('div',{style:{color:"#ccc",fontSize:13}},"Nessun attacco nel periodo")
    ),
    head.some(function(a){return a.painLevel>0;})?e('div',{style:{background:CARD_BG,borderRadius:12,border:"1px solid #ececec",padding:"18px 16px",marginBottom:24}},e(STitle,null,"💢 Intensit\u00e0 dolore"),e(PainDist,{attacks:head})):null,
    e('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}},
      e('div',{style:{background:CARD_BG,borderRadius:12,border:"1px solid #ececec",padding:"18px 14px"}},e(STitle,null,"🧠 Fattori testa"),e(BarChart,{data:countF(head,"triggers"),color:HEAD_COLOR})),
